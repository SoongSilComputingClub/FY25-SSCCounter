<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>동방 인원 카운팅</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/styles/index.css" />
  </head>
  <body>
    <main role="main" aria-labelledby="page-title">
      <h1 id="page-title">동방에 몇 명이 있는지 확인해보세요</h1>
      <p id="now" aria-live="polite">📅 현재 시각: 로딩 중...</p>

      <div>
        <button id="btn-count" type="button" aria-label="동방 인원 확인">동방 인원 확인</button>
        <button id="btn-logs" type="button" aria-label="로그 확인">📈 로그 확인하기</button>
      </div>

      <div class="loader" id="loader" aria-live="polite">🔄 인원 분석 중...</div>
      <p id="result">[결과 없음]</p>
      <p id="timestamp"></p>
    </main>

    <script src="/static/scripts/index.js" defer></script>
  </body>
</html>
